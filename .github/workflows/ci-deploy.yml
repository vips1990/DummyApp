name: CI Build & Deploy to Azure VM

on:
  push:
    # Run CI on all branches
  pull_request:
    # Also run CI on pull requests

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (if any)
        run: |
          echo "No tests configured yet"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if this is a merge commit
        id: check_merge
        run: |
          # Check if the latest commit is a merge commit
          if git show --no-patch --format=%p HEAD | grep -q " "; then
            echo "is_merge=true" >> $GITHUB_OUTPUT
          else
            echo "is_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Azure VM via SSH
        if: steps.check_merge.outputs.is_merge == 'true'
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: ${{ secrets.AZURE_VM_PORT }}
          script: |
            set -e
            cd /home/${{ secrets.AZURE_VM_USER }}/app
            git fetch origin main
            git reset --hard origin/main
            python3 -m pip install --upgrade pip
            pip install -r requirements.txt
            # Run the app with gunicorn (adjust bind/worker count as needed)
            pkill -f "gunicorn.*app:app" || true
            nohup gunicorn --bind 0.0.0.0:8000 app:app &
